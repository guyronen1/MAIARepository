
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f0f0ec',
    primaryBorderColor: dark ? '#4a4a46' : '#c8c8c0',
  },
});

const diagram = `erDiagram
  JobTypes {
    int JobTypeId PK
    varchar Name
    varchar Description
    bit IsActive
  }
  ErrorTypes {
    int ErrorTypeId PK
    varchar Code
    varchar DisplayName
    nvarchar Description
    varchar Severity
    bit IsActive
  }
  JobFailures {
    int FailureId PK
    int JobId
    int JobTypeId FK
    int ErrorTypeId FK
    varchar StepName
    varchar FileName
    nvarchar ErrorMessage
    datetime DetectedAt
    varchar SourceLogPath
    varchar Status
  }
  ClassificationRules {
    int RuleId PK
    int JobTypeId FK
    int ErrorTypeId FK
    varchar Pattern
    decimal Confidence
    int Priority
    bit IsActive
    varchar CreatedBy
  }
  FixPolicyRules {
    int RuleId PK
    int JobTypeId FK
    int ErrorTypeId FK
    varchar ActionToApply
    varchar FixCategory
    bit IsAutoHealEligible
    bit Enabled
    varchar CreatedBy
    datetime ActionTimestamp
  }
  AIRecommendations {
    int RecommendationId PK
    int FailureId FK
    int ErrorTypeId FK
    varchar SuggestedAction
    varchar FixCategory
    decimal ConfidenceScore
    nvarchar Explanation
    datetime RecommendedAt
    bit AutoFixAvailable
    bit OperatorApproved
    bit IsExecuted
  }
  OperatorActions {
    int ActionId PK
    int RecommendationId FK
    varchar OperatorId
    varchar ActionTaken
    datetime ActionTimestamp
  }
  FixExecutionLog {
    int FixId PK
    int FailureId FK
    int RecommendationId FK
    varchar ExecutedAction
    varchar TriggerType
    varchar ExecutedBy
    datetime ExecutedAt
    bit Success
    nvarchar ResultDetail
  }
  AuditLog {
    int AuditId PK
    int FailureId FK
    varchar EventType
    varchar Actor
    nvarchar Detail
    datetime Timestamp
  }

  JobTypes        ||--o{ JobFailures         : "has"
  JobTypes        ||--o{ ClassificationRules : "defines"
  JobTypes        ||--o{ FixPolicyRules      : "governs"
  ErrorTypes      ||--o{ JobFailures         : "classifies"
  ErrorTypes      ||--o{ ClassificationRules : "used in"
  ErrorTypes      ||--o{ FixPolicyRules      : "drives"
  ErrorTypes      ||--o{ AIRecommendations   : "typed by"
  JobFailures     ||--o{ AIRecommendations   : "generates"
  AIRecommendations ||--o{ OperatorActions   : "receives"
  AIRecommendations ||--o{ FixExecutionLog   : "triggers"
  JobFailures     ||--o{ FixExecutionLog     : "logs"
  JobFailures     ||--o{ AuditLog            : "audited"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
